<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your VirtuLab account – Digital Electronics & AR Virtual Laboratory">
    <title>VirtuLab – Sign Up</title>
    <link rel="stylesheet" href="/frontend/static/css/auth.css">
    <script src="/frontend/static/js/config.js"></script>
    <script src="/frontend/static/js/api.js"></script>
    <script src="/frontend/static/js/auth.js"></script>
</head>
<body class="theme-dark">

<!-- Animated Background -->
<div class="auth-bg">
    <div class="auth-bg-orb"></div>
    <div class="auth-bg-orb"></div>
    <div class="auth-bg-orb"></div>
</div>

<!-- Theme Toggle -->
<button class="auth-theme-toggle" id="authThemeToggle" aria-label="Toggle theme">🌙</button>

<!-- Success Overlay -->
<div class="auth-success-overlay" id="authSuccess">
    <div class="auth-success-icon">✓</div>
    <div class="auth-success-text">Account created!</div>
</div>

<!-- Auth Card -->
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">◈ VIRTULAB</div>
        <div class="auth-title">Create Account</div>
        <div class="auth-sub">Register to start your virtual lab journey</div>

        <form id="signupForm" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="regName">Full Name</label>
                <input type="text" id="regName" placeholder="Rahul Sharma" required autocomplete="name" />
            </div>
            <div class="form-group">
                <label for="regRoll">Roll Number</label>
                <input type="text" id="regRoll" placeholder="CS2024001" required />
            </div>
            <div class="form-group">
                <label for="regEmail">Email</label>
                <input type="email" id="regEmail" placeholder="rahul@college.edu" required autocomplete="email" />
            </div>
            <div class="form-group">
                <label for="regPass">Password</label>
                <div class="pass-wrapper">
                    <input type="password" id="regPass" placeholder="min 8 characters" required minlength="8" autocomplete="new-password" />
                    <button type="button" class="pass-toggle" aria-label="Show password">👁️</button>
                </div>
                <!-- Password Strength Meter -->
                <div class="pass-strength" id="passStrength">
                    <div class="pass-strength-bar">
                        <div class="pass-strength-fill"></div>
                    </div>
                    <div class="pass-strength-label"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="regPass2">Confirm Password</label>
                <div class="pass-wrapper">
                    <input type="password" id="regPass2" placeholder="repeat password" required minlength="8" autocomplete="new-password" />
                    <button type="button" class="pass-toggle" aria-label="Show password">👁️</button>
                </div>
            </div>
            <button class="auth-btn" type="submit" id="signupBtn">
                <span class="btn-text">Create Account →</span>
                <span class="spinner"></span>
            </button>
            <div id="signupMsg" class="auth-msg"></div>
            <div class="auth-switch">Already registered? <a href="/frontend/templates/login.html">Sign in</a></div>
        </form>
    </div>
</div>

<script>
    // Redirect if already logged in
    if (VirtuLabAPI.getCurrentUser()) {
        window.location.href = '/dashboard';
    }

    // Init auth helpers
    VirtuLabAuth.initTheme();
    VirtuLabAuth.initPasswordToggles();
    VirtuLabAuth.initStrengthMeter('regPass', 'passStrength');

    async function handleSignup(e) {
        e.preventDefault();
        const msgEl = document.getElementById('signupMsg');
        msgEl.textContent = '';
        msgEl.className = 'auth-msg';

        const name = document.getElementById('regName').value.trim();
        const roll = document.getElementById('regRoll').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value;
        const pass2 = document.getElementById('regPass2').value;

        if (pass !== pass2) {
            msgEl.textContent = 'Passwords do not match.';
            msgEl.className = 'auth-msg error';
            return;
        }

        VirtuLabAuth.setLoading('signupBtn', true);

        try {
            await VirtuLabAPI.signup(name, roll, email, pass);
            VirtuLabAuth.showSuccess('Account created successfully. Please log in to continue.', '/frontend/templates/login.html');
        } catch (err) {
            msgEl.textContent = err.message;
            msgEl.className = 'auth-msg error';
        } finally {
            VirtuLabAuth.setLoading('signupBtn', false);
        }
    }
</script>

</body>
</html>
